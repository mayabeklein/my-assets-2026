<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Balance | Recipe Library</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --rose: #EC6CA1;
            --olive: #4A503C;
            --sage: #889671;
            --white: #FFFFFF;
            --bg: #FDFCFB;
            --border: rgba(74, 80, 60, 0.08);
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg); 
            color: var(--olive); 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, span, p, button { font-style: normal !important; }

        .recipe-card {
            background: var(--white);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(74, 80, 60, 0.05);
            border-color: var(--rose);
        }

        .filter-btn {
            white-space: nowrap;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            background: white;
        }

        .filter-btn.active {
            background: var(--olive);
            color: white;
            border-color: var(--olive);
        }

        .tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--bg);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // נתוני המתכונים ששאבנו מה-Notion
        const RECIPE_DATA = [
            { id: 46, title: "שייק ירוק עמוק", cat: "שייקים", time: "5 דק'", level: "קל", gluten: false, dairy: false, ingredients: ["חסה", "קישוא", "תפוח", "ספירולינה"], substitutes: "תפוח -> אגס", benefit: "ניקוי כבד ואיזון אנרגיה" },
            { id: 47, title: "סלמון במרינדת אסיאתית", cat: "חלבונים", time: "20 דק'", level: "בינוני", gluten: false, dairy: false, ingredients: ["פילה סלמון", "סויה", "ג'ינג'ר", "שום"], substitutes: "סלמון -> דג לבן", benefit: "אומגה 3 ושובע ממושך" },
            { id: 48, title: "מאפינס ברוקולי פטה", cat: "מאפים", time: "35 דק'", level: "קל", gluten: true, dairy: true, ingredients: ["ברוקולי", "ביצים", "גבינת פטה", "קמח כוסמין"], substitutes: "קמח כוסמין -> קמח שקדים", benefit: "חלבון זמין בבוקר" },
            { id: 49, title: "סלט נבטים וקולורבי", cat: "סלטים", time: "12 דק'", level: "קל", gluten: false, dairy: false, ingredients: ["נבטים סיניים", "קולורבי", "בוטנים", "רוטב אסייתי"], substitutes: "בוטנים -> שומשום", benefit: "קראנץ' מטבולי" },
            // מיה - כאן יכנסו שאר 87 המתכונים מהנושן באותו מבנה
        ];

        const App = () => {
            const [activeCat, setActiveCat] = useState('הכל');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [filterGluten, setFilterGluten] = useState(false);

            const categories = ['הכל', 'שייקים', 'חלבונים', 'סלטים', 'מאפים', 'רטבים', 'מתוקים'];

            const filteredRecipes = useMemo(() => {
                return RECIPE_DATA.filter(r => {
                    const matchesCat = activeCat === 'הכל' || r.cat === activeCat;
                    const matchesSearch = r.title.includes(searchQuery) || r.ingredients.some(i => i.includes(searchQuery));
                    const matchesGluten = filterGluten ? !r.gluten : true;
                    return matchesCat && matchesSearch && matchesGluten;
                });
            }, [activeCat, searchQuery, filterGluten]);

            if (selectedRecipe) {
                return (
                    <div className="min-h-screen bg-white p-6 animate-in fade-in" dir="rtl">
                        <button onClick={() => setSelectedRecipe(null)} className="mb-8 flex items-center gap-2 font-bold text-sm opacity-50">
                            <span>←</span> חזרה לספרייה
                        </button>
                        <div className="max-w-2xl mx-auto space-y-8">
                            <header className="space-y-4 text-center">
                                <span className="tag text-[#EC6CA1]">{selectedRecipe.cat}</span>
                                <h1 className="text-4xl font-extrabold tracking-tight">{selectedRecipe.title}</h1>
                                <p className="text-lg opacity-60 font-medium italic">{selectedRecipe.benefit}</p>
                            </header>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-[#FDFCFB] p-4 rounded-2xl border border-black/5 text-center">
                                    <div className="text-[10px] font-black uppercase opacity-30">זמן הכנה</div>
                                    <div className="font-bold">{selectedRecipe.time}</div>
                                </div>
                                <div className="bg-[#FDFCFB] p-4 rounded-2xl border border-black/5 text-center">
                                    <div className="text-[10px] font-black uppercase opacity-30">רמת קושי</div>
                                    <div className="font-bold">{selectedRecipe.level}</div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <h3 className="text-xl font-bold border-b pb-2">מה צריך?</h3>
                                <ul className="space-y-3">
                                    {selectedRecipe.ingredients.map(ing => (
                                        <li key={ing} className="flex items-center gap-3 font-medium">
                                            <span className="w-1.5 h-1.5 rounded-full bg-[#EC6CA1]"></span>
                                            {ing}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="bg-[#4A503C] text-white p-6 rounded-[24px]">
                                <h3 className="text-[11px] font-black uppercase tracking-widest opacity-50 mb-3">תחליפים חכמים</h3>
                                <p className="font-bold">{selectedRecipe.substitutes}</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-6 pb-20">
                    <header className="py-12 text-center space-y-4">
                        <span className="text-[10px] font-black uppercase tracking-[0.5em] opacity-30">Fuel Library</span>
                        <h1 className="text-5xl font-black italic uppercase tracking-tighter text-[#4A503C]">ספריית הדלק</h1>
                        <p className="text-lg font-medium opacity-50">87 מתכונים שנבחרו בקפידה לאיזון המערכת שלך.</p>
                    </header>

                    {/* Search & Filters */}
                    <div className="space-y-6 mb-12">
                        <input 
                            type="text" 
                            placeholder="חפשי מתכון או רכיב (למשל: סלמון...)"
                            className="w-full p-5 rounded-3xl bg-white border border-black/5 shadow-sm outline-none focus:ring-2 focus:ring-[#EC6CA1]/20 transition-all font-bold"
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                        
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                            {categories.map(c => (
                                <button 
                                    key={c} 
                                    onClick={() => setActiveCat(c)}
                                    className={`filter-btn ${activeCat === c ? 'active' : ''}`}
                                >
                                    {c}
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-3 pt-2">
                            <button 
                                onClick={() => setFilterGluten(!filterGluten)}
                                className={`text-[11px] font-bold px-4 py-2 rounded-full transition-all border ${filterGluten ? 'bg-[#EC6CA1]/10 border-[#EC6CA1] text-[#EC6CA1]' : 'opacity-40 border-black/5'}`}
                            >
                                🌾 ללא גלוטן בלבד
                            </button>
                        </div>
                    </div>

                    {/* Recipe Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {filteredRecipes.map(recipe => (
                            <div key={recipe.id} onClick={() => setSelectedRecipe(recipe)} className="recipe-card p-6 cursor-pointer flex flex-col justify-between h-48">
                                <div>
                                    <div className="flex justify-between items-start mb-4">
                                        <span className="text-[9px] font-black uppercase tracking-widest opacity-40">{recipe.cat}</span>
                                        {!recipe.gluten && <span className="text-[18px]">🌾</span>}
                                    </div>
                                    <h3 className="text-2xl font-black italic uppercase leading-tight tracking-tighter mb-2">{recipe.title}</h3>
                                    <p className="text-xs font-bold opacity-40 leading-relaxed line-clamp-1">{recipe.ingredients.join(', ')}</p>
                                </div>
                                <div className="flex justify-between items-center pt-4 border-t border-black/5">
                                    <span className="text-[10px] font-bold opacity-30">{recipe.time} • {recipe.level}</span>
                                    <span className="text-[#EC6CA1] font-black">View →</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
