<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Library | My Balance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --rose-pink: #EC6CA1;
            --dark-olive: #4A503C;
            --sage-green: #889671;
            --white: #FFFFFF;
            --rose-light: rgba(236, 108, 161, 0.10);
            --olive-10: rgba(74, 80, 60, 0.10);
            --sage-light: rgba(136, 150, 113, 0.12);
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--white); 
            color: var(--dark-olive); 
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        h1, h2, h3, h4, span, p, button { font-style: normal !important; letter-spacing: -0.01em; }
        
        .luxury-card { 
            background: var(--white); 
            border: 1px solid var(--olive-10); 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(74, 80, 60, 0.04); 
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .luxury-card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(74, 80, 60, 0.08); }

        .recipe-image { width: 100%; height: 220px; object-cover: cover; background-color: #F8F9FA; }

        .filter-chip {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid var(--olive-10);
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-chip.active { background-color: var(--dark-olive); color: white; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .protocol-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.9);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--rose-pink);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const Icons = {
            Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            ChevronLeft: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        // --- ה-DATABASE המורחב: בלוק סלטים (עמ' 54-88) ---
        const RECIPE_DATABASE = [
            {
                id: 10,
                category: "סלטים",
                program: "ReBalance",
                title: "טחינה ירוקה (ה-טחינה לשבת)",
                subtitle: "סמיכה, עשירה ומלאת טעם",
                time: "10 דק'",
                image: "https://images.unsplash.com/photo-1547514701-42782101795e?w=800&q=80",
                ingredients: ["1 כוס טחינה גולמית", "מיץ מ-2 לימונים", "2 כפות שום כתוש", "חופן פטרוזיליה קצוצה", "10 קוביות קרח"],
                instructions: ["קוצצים את הפטרוזיליה דק מאוד.", "מערבבים טחינה, לימון ותבלינים.", "מוסיפים קרח ומערבבים עד למרקם אוורירי."],
                benefit: "עשירה בסידן וברזל, משביעה מאוד."
            },
            {
                id: 11,
                category: "סלטים",
                program: "ReBalance",
                title: "סלט סלק ורוקט",
                subtitle: "שילוב של מתיקות וחריפות עדינה",
                time: "25 דק'",
                image: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=800&q=80",
                ingredients: ["2 סלקים בינוניים", "חופן רוקט", "1 כף שמן זית", "מלח גס", "חרדל דיז'ון"],
                instructions: ["אופים סלקים ב-180 מעלות עד ריכוך.", "חותכים לקוביות ומניחים על מצע רוקט.", "מזלפים רוטב ומגישים."],
                benefit: "הסלק מצוין לניקוי הכבד והורדת נפיחות."
            },
            {
                id: 12,
                category: "תוספות",
                program: "72h Reset",
                title: "כרובית שלמה אפויה",
                subtitle: "הזהובה המפורסמת של מיה",
                time: "65 דק'",
                image: "https://images.unsplash.com/photo-1596797038558-9da50b1a735c?w=800&q=80",
                ingredients: ["1 כרובית גדולה", "2 כפות שמן זית", "1 כף מייפל", "מלח גס", "פלפל שחור"],
                instructions: ["מרתיחים כרובית במים 20 דקות.", "מברישים בתערובת השמן והמייפל.", "אופים ב-200 מעלות עד הזהבה עמוקה."],
                benefit: "ירק מצליב שעוזר באיזון אסטרוגן."
            },
            {
                id: 13,
                category: "סלטים",
                program: "Asian",
                title: "סלט נבטים אסיאתי",
                subtitle: "קראנץ' מטורף לכל ארוחה",
                time: "10 דק'",
                image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800&q=80",
                ingredients: ["2 חבילות נבטים", "1 קולורבי", "3 צנוניות", "כוסברה", "בוטנים גרוסים"],
                instructions: ["חותכים את הירקות לגפרורים.", "מערבבים את חומרי הרוטב בבלנדר.", "מפזרים בוטנים ממש לפני ההגשה."],
                benefit: "עשיר באנזימי עיכול חיים."
            }
        ];

        const App = () => {
            const [search, setSearch] = useState("");
            const [activeCat, setActiveCat] = useState("הכל");
            const [selected, setSelected] = useState(null);

            const filtered = useMemo(() => {
                return RECIPE_DATABASE.filter(r => {
                    const matchesSearch = r.title.includes(search) || r.program.includes(search);
                    const matchesCat = activeCat === "הכל" || r.category === activeCat;
                    return matchesSearch && matchesCat;
                });
            }, [search, activeCat]);

            // תצוגת מתכון בודד
            if (selected) return (
                <div className="min-h-screen bg-white animate-in p-6">
                    <button onClick={() => setSelected(null)} className="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.3em] mb-10 opacity-40">
                        <Icons.ChevronLeft /> חזרה לספרייה
                    </button>
                    <div className="max-w-xl mx-auto space-y-8">
                        <img src={selected.image} className="w-full h-64 object-cover rounded-[30px] shadow-lg" alt={selected.title} />
                        <div className="text-right space-y-4">
                            <span className="text-[10px] font-black text-rose-pink uppercase tracking-widest">{selected.program}</span>
                            <h1 className="text-4xl font-extrabold tracking-tighter">{selected.title}</h1>
                            <p className="text-slate-400 font-bold">{selected.subtitle}</p>
                        </div>
                        <div className="grid grid-cols-2 gap-8 pt-8 border-t border-olive-10">
                            <div className="space-y-4">
                                <h3 className="font-black text-xs uppercase tracking-widest text-rose-pink">המצרכים</h3>
                                <ul className="space-y-2">
                                    {selected.ingredients.map(i => <li key={i} className="text-sm font-bold flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-rose-pink"></div>{i}</li>)}
                                </ul>
                            </div>
                            <div className="space-y-4">
                                <h3 className="font-black text-xs uppercase tracking-widest text-rose-pink">אופן ההכנה</h3>
                                <div className="space-y-4">
                                    {selected.instructions.map((step, idx) => (
                                        <div key={idx} className="flex gap-3">
                                            <span className="text-xs font-black opacity-20">0{idx+1}</span>
                                            <p className="text-xs font-bold leading-relaxed">{step}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // תצוגת גלריה
            return (
                <div className="min-h-screen pb-32 animate-in">
                    <header className="px-6 pt-16 pb-10 text-center space-y-6">
                        <div className="inline-block px-3 py-1 bg-rose-light text-rose-pink rounded-full text-[10px] font-black uppercase tracking-widest">The Fuel Library</div>
                        <h1 className="text-4xl md:text-6xl font-black tracking-tighter italic uppercase leading-none">מנוע הסלטים <br/>והתוספות.</h1>
                        
                        <div className="relative max-w-md mx-auto mt-8">
                            <input 
                                type="text" 
                                placeholder="חפשי מתכון או רכיב..."
                                className="w-full bg-slate-50 border-none rounded-2xl p-5 pr-12 text-sm font-bold outline-none focus:ring-2 focus:ring-rose-pink transition-all"
                                onChange={(e) => setSearch(e.target.value)}
                            />
                            <div className="absolute top-5 right-5 opacity-20"><Icons.Search /></div>
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar justify-center pt-4">
                            {["הכל", "סלטים", "תוספות"].map(cat => (
                                <button key={cat} onClick={() => setActiveCat(cat)} className={`filter-chip ${activeCat === cat ? 'active' : 'opacity-40'}`}>{cat}</button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        {filtered.map(r => (
                            <div key={r.id} onClick={() => setSelected(r)} className="luxury-card group cursor-pointer">
                                <div className="relative">
                                    <img src={r.image} className="recipe-image transition-transform group-hover:scale-105 duration-700" alt={r.title} />
                                    <div className="protocol-tag">{r.program}</div>
                                </div>
                                <div className="p-8 space-y-3">
                                    <div className="flex justify-between items-center">
                                        <span className="text-[9px] font-black opacity-30 uppercase tracking-widest">{r.category}</span>
                                        <div className="flex items-center gap-1 text-[9px] font-bold opacity-30"><Icons.Clock /> {r.time}</div>
                                    </div>
                                    <h3 className="text-2xl font-black tracking-tight group-hover:text-rose-pink transition-colors">{r.title}</h3>
                                    <p className="text-[11px] font-bold opacity-40 leading-relaxed">{r.benefit}</p>
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
