<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Balance | Empire OS Preview</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --rose: #EC6CA1; --olive: #4A503C; --sage: #889671; --white: #FFFFFF; --bg: #FDFCFB; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--olive); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-black { font-weight: 800; }
        .luxury-card { background: var(--white); border-radius: 32px; border: 1px solid rgba(74, 80, 60, 0.05); box-shadow: 0 15px 45px rgba(74, 80, 60, 0.03); }
        .nav-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .ritual-gradient { background: linear-gradient(135deg, #4A503C 0%, #34382A 100%); }
        .input-fine { width: 100%; padding: 1.2rem; border-radius: 20px; border: 1px solid rgba(74, 80, 60, 0.1); background: #F9F9F7; outline: none; text-align: right; font-weight: 600; }
        .input-fine:focus { border-color: var(--rose); background: white; }
        .animate-up { animation: slideUp 0.6s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-pill { width: 100%; padding: 1.2rem; border-radius: 100px; font-weight: 800; transition: all 0.3s ease; text-align: center; }
        .btn-active { background: var(--olive); color: white; border: 2px solid var(--olive); }
        .btn-inactive { background: white; border: 2px solid rgba(74, 80, 60, 0.1); color: var(--olive); opacity: 0.6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Config (DNA) ---
        const firebaseConfig = {
            apiKey: "AIzaSyByO-6lO1Wn0S3Idwhv3eAohPNAOmMJ_WQ",
            authDomain: "my-balance-empire.firebaseapp.com",
            projectId: "my-balance-empire",
            storageBucket: "my-balance-empire.firebasestorage.app",
            messagingSenderId: "469352045239",
            appId: "1:469352045239:web:95c953de45063a6bc0cb32"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "my-balance-empire";

        // --- AI API Helper ---
        const callGemini = async (prompt, profile) => {
            const apiKey = ""; // API Key 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const context = profile ? `המשתמש/ת הוא/היא ${profile.gender === 'female' ? 'אישה' : 'גבר'}, המטרה העיקרית שלו/ה היא ${profile.goal}, והתזונה שלו/ה היא ${profile.diet === 'vegan' ? 'טבעונית' : profile.diet === 'veg' ? 'צמחונית' : 'הכל'}.` : '';
            const systemPrompt = `אתה העוזר המטבולי האישי באפליקציית My Balance של מיה בקי. עליך לענות בטון יוקרתי, מעצים, מקצועי ואישי. השתמש במושגים מהשיטה: ריטואל, איזון מטבולי, הזנה אמיתית. התייחס לנתונים האישיים של המשתמש: ${context} ענה בעברית רהוטה וקצרה.`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return "משהו בחיבור המטבולי השתבש... נסי שוב בעוד רגע."; }
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('loading'); 
            const [step, setStep] = useState(1);
            const [onboardingData, setOnboardingData] = useState({ gender: 'female', goal: '', diet: 'meat' });

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const docRef = db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('profile').doc('data');
                        const doc = await docRef.get();
                        if (doc.exists) {
                            setProfile(doc.data());
                            setView('home');
                        } else {
                            setView('onboarding');
                        }
                    } else {
                        setView('login');
                    }
                });
                return () => unsub();
            }, []);

            const saveProfile = async () => {
                if (!onboardingData.goal) return alert("אנא בחרי מטרה");
                try {
                    const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('data');
                    await docRef.set({ ...onboardingData, completedAt: new Date() });
                    setProfile(onboardingData);
                    setView('home');
                } catch (e) { alert("שגיאה בשמירת הנתונים"); }
            };

            if (view === 'loading') return (
                <div className="min-h-screen flex items-center justify-center bg-[#FDFCFB]">
                    <div className="text-center animate-pulse">
                        <div className="w-16 h-16 border-4 border-rose-100 border-t-[#EC6CA1] rounded-full animate-spin mx-auto mb-4"></div>
                        <span className="text-[10px] font-black tracking-[0.5em] text-[#EC6CA1] uppercase opacity-40 italic">Syncing Empire OS</span>
                    </div>
                </div>
            );

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-8 bg-[#FDFCFB]">
                    <div className="luxury-card p-12 w-full max-w-md text-center animate-up">
                        <div className="w-16 h-16 border-2 border-[#4A503C] rounded-2xl flex items-center justify-center font-black text-xl mx-auto mb-8 relative">MB</div>
                        <h1 className="text-4xl font-black italic tracking-tighter mb-4 text-[#4A503C]">Empire OS <br/><span className="text-[#EC6CA1]">Preview Mode.</span></h1>
                        <p className="opacity-40 font-bold mb-12 text-sm italic">זוהי גרסת בדיקה סגורה</p>
                        <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full flex items-center justify-center gap-4 py-4 border border-black/5 rounded-2xl font-bold bg-white shadow-sm">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"/> כניסה לבדיקת המערכת
                        </button>
                    </div>
                </div>
            );

            if (view === 'onboarding') return (
                <div className="min-h-screen p-8 bg-[#FDFCFB] animate-up">
                    <div className="max-w-md mx-auto pt-10">
                        <div className="flex justify-between items-center mb-16">
                            <span className="text-[10px] font-black uppercase tracking-[0.3em] opacity-20 italic">Step 0{step} / 03</span>
                            <div className="flex gap-1.5">
                                {[1,2,3].map(s => <div key={s} className={`h-1.5 w-10 rounded-full transition-all ${step >= s ? 'bg-[#EC6CA1]' : 'bg-black/5'}`}></div>)}
                            </div>
                        </div>

                        {step === 1 && (
                            <div className="space-y-12">
                                <h2 className="text-4xl font-black italic tracking-tighter text-[#4A503C]">נעים להכיר, <br/><span className="text-[#EC6CA1]">מי את?</span></h2>
                                <div className="grid gap-4">
                                    <button onClick={()=>setOnboardingData({...onboardingData, gender:'female'})} className={`btn-pill ${onboardingData.gender==='female'?'btn-active':'btn-inactive'}`}>אישה</button>
                                    <button onClick={()=>setOnboardingData({...onboardingData, gender:'male'})} className={`btn-pill ${onboardingData.gender==='male'?'btn-active':'btn-inactive'}`}>גבר</button>
                                </div>
                                <button onClick={()=>setStep(2)} className="w-full bg-[#EC6CA1] text-white py-5 rounded-3xl font-black text-lg shadow-xl mt-10">בואי נתחיל ←</button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-12">
                                <h2 className="text-4xl font-black italic tracking-tighter text-[#4A503C]">מה המטרה <br/><span className="text-[#EC6CA1]">שלנו היום?</span></h2>
                                <div className="grid gap-4">
                                    {['ירידה במשקל', 'איזון הורמונלי', 'אנרגיה וחיטוב', 'שמירה על הקיים'].map(g => (
                                        <button key={g} onClick={()=>setOnboardingData({...onboardingData, goal:g})} className={`btn-pill ${onboardingData.goal===g?'btn-active':'btn-inactive'}`}>{g}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setStep(3)} className="w-full bg-[#EC6CA1] text-white py-5 rounded-3xl font-black text-lg shadow-xl mt-10">כמעט שם ←</button>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-12">
                                <h2 className="text-4xl font-black italic tracking-tighter text-[#4A503C]">איך הצלחת <br/><span className="text-[#EC6CA1]">נראית?</span></h2>
                                <div className="grid gap-4">
                                    {[{id:'meat', l:'אוכלת הכל'}, {id:'veg', l:'צמחונית'}, {id:'vegan', l:'טבעונית'}].map(d => (
                                        <button key={d.id} onClick={()=>setOnboardingData({...onboardingData, diet:d.id})} className={`btn-pill ${onboardingData.diet===d.id?'btn-active':'btn-inactive'}`}>{d.l}</button>
                                    ))}
                                </div>
                                <button onClick={saveProfile} className="w-full bg-[#4A503C] text-white py-5 rounded-3xl font-black text-lg shadow-xl mt-10">הפעלת הקיסרות שלי 🎉</button>
                            </div>
                        )}
                    </div>
                </div>
            );

            const HomeView = () => (
                <div className="animate-up p-6 pb-32 space-y-10 max-w-md mx-auto">
                    <header className="flex justify-between items-center pt-6">
                        <div>
                            <span className="text-[10px] font-black tracking-[0.4em] text-[#EC6CA1] uppercase block mb-1">Morning Ritual</span>
                            <h1 className="text-4xl font-black italic tracking-tighter text-[#4A503C]">היי {user.displayName?.split(' ')[0]}, <br/><span className="opacity-20 italic">הכל מאוזן.</span></h1>
                        </div>
                        <div className="w-12 h-12 rounded-2xl overflow-hidden border-2 border-white shadow-lg"><img src={user.photoURL} className="w-full h-full object-cover"/></div>
                    </header>

                    <div className="ritual-gradient luxury-card p-10 text-white relative overflow-hidden group">
                        <div className="relative z-10 flex flex-col justify-between h-48">
                            <div>
                                <h2 className="text-5xl font-black italic tracking-tighter leading-none mb-4">הריטואל<br/>היומי</h2>
                                <div className="flex items-center gap-2 opacity-60 text-[10px] font-bold tracking-widest uppercase italic">
                                    <div className="w-2 h-2 bg-[#EC6CA1] rounded-full animate-pulse"></div> Active Preview
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <button className="w-14 h-14 bg-[#EC6CA1] rounded-full flex items-center justify-center shadow-2xl hover:scale-105 transition-all">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                </button>
                                <span className="text-[10px] font-black tracking-[0.2em] opacity-40 italic uppercase">Tap to start</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid gap-5">
                        <div className="luxury-card p-8 flex items-center justify-between group hover:border-[#EC6CA1]/20 cursor-pointer">
                            <div>
                                <span className="text-[10px] font-black opacity-30 uppercase tracking-widest block mb-1">Inspiration</span>
                                <h3 className="text-xl font-bold italic text-[#4A503C]">שיר השראה יומי 🎵</h3>
                            </div>
                            <div className="w-10 h-10 rounded-full border border-black/5 flex items-center justify-center opacity-30">→</div>
                        </div>
                        <div className="luxury-card p-8 flex items-center justify-between group hover:border-[#EC6CA1]/20 cursor-pointer">
                            <div>
                                <span className="text-[10px] font-black opacity-30 uppercase tracking-widest block mb-1">Affirmation</span>
                                <h3 className="text-xl font-bold italic text-[#4A503C]">עוגן מטבולי להיום ⚓</h3>
                            </div>
                            <div className="w-10 h-10 rounded-full border border-black/5 flex items-center justify-center opacity-30">→</div>
                        </div>
                    </div>

                    <div className="p-6 bg-rose-50/50 rounded-3xl border border-rose-100 text-center">
                        <p className="text-[10px] font-black text-[#EC6CA1] uppercase tracking-widest mb-2">Dev Note</p>
                        <p className="text-xs font-bold text-[#4A503C] opacity-60">הדף הזה הוא preview.html. המשתמשות לא רואות אותו.</p>
                    </div>
                </div>
            );

            const AiView = () => {
                const [input, setInput] = useState('');
                const [chat, setChat] = useState([]);
                const [typing, setTyping] = useState(false);
                const chatEndRef = useRef(null);

                useEffect(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), [chat, typing]);

                const handleSend = async () => {
                    if(!input.trim()) return;
                    const newChat = [...chat, { role: 'user', text: input }];
                    setChat(newChat);
                    setInput('');
                    setTyping(true);
                    const res = await callGemini(input, profile);
                    setChat([...newChat, { role: 'ai', text: res }]);
                    setTyping(false);
                };

                return (
                    <div className="animate-up flex flex-col h-[85vh] p-6 pb-24 max-w-md mx-auto">
                        <header className="flex justify-between items-center mb-8 pt-4">
                            <button onClick={()=>setView('home')} className="opacity-30 font-black text-[10px] uppercase">← Home</button>
                            <h2 className="text-2xl font-black italic tracking-tighter text-[#EC6CA1]">MAYA AI.</h2>
                        </header>
                        <div className="flex-1 overflow-y-auto space-y-6 no-scrollbar px-2">
                            {chat.length === 0 && (
                                <div className="text-center py-20 opacity-20"><div className="text-5xl mb-6">✨</div><p className="font-bold text-[10px]">איך אפשר לדייק אותך היום?</p></div>
                            )}
                            {chat.map((m,i) => (
                                <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                                    <div className={`max-w-[85%] p-5 text-sm font-bold leading-relaxed rounded-[28px] ${m.role==='user'?'bg-[#4A503C] text-white rounded-br-none':'bg-white border border-black/5 rounded-bl-none shadow-sm text-[#4A503C]'}`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                            {typing && <div className="text-[10px] font-black opacity-30 animate-pulse italic text-right">מיה חושבת...</div>}
                            <div ref={chatEndRef} />
                        </div>
                        <div className="mt-4 relative">
                            <input value={input} onChange={(e)=>setInput(e.target.value)} onKeyPress={(e)=>e.key==='Enter'&&handleSend()} placeholder="שאלי אותי הכל..." className="input-fine pr-14 shadow-2xl border-none" />
                            <button onClick={handleSend} className="absolute left-4 top-1/2 -translate-y-1/2 text-[#EC6CA1]"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative">
                    {view === 'home' && <HomeView />}
                    {view === 'ai' && <AiView />}

                    {view !== 'onboarding' && view !== 'login' && (
                        <nav className="fixed bottom-0 left-0 right-0 nav-blur px-10 py-6 pb-12 flex justify-around items-center z-50 max-w-md mx-auto rounded-t-[45px] shadow-2xl">
                            <button onClick={()=>setView('home')} className={`transition-all ${view==='home'?'text-[#EC6CA1] scale-125':'opacity-20'}`}>
                                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            </button>
                            <button onClick={()=>setView('ai')} className={`transition-all ${view==='ai'?'text-[#EC6CA1] scale-125':'opacity-20'}`}>
                                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            </button>
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
