<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Balance | Upgrading</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rose: #EC6CA1;
            --olive: #4A503C;
            --white: #FFFFFF;
            --bg: #FDFCFB;
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg); 
            color: var(--olive);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            /* ביטול נטוי גורף */
            font-style: normal !important;
            -webkit-font-smoothing: antialiased;
        }

        * { font-style: normal !important; }

        .luxury-container {
            background: var(--white);
            padding: 5rem 3rem;
            border-radius: 32px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(74, 80, 60, 0.06);
            box-shadow: 0 30px 70px rgba(74, 80, 60, 0.04);
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            width: 70px;
            height: 70px;
            border: 1px solid var(--olive);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 3rem;
            position: relative;
        }

        .logo-box::after {
            content: '';
            position: absolute;
            top: -6px;
            right: -6px;
            width: 12px;
            height: 12px;
            background: var(--rose);
        }

        .letter-spacing-fine {
            letter-spacing: 0.4em;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--rose);
            margin: 2.5rem auto;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="luxury-container">
        <!-- Luxury Monogram -->
        <div class="logo-box">
            <span class="text-2xl font-extrabold tracking-tighter">MB</span>
        </div>

        <span class="text-[10px] font-bold uppercase letter-spacing-fine opacity-30 block mb-6">Metabolic Empire OS</span>
        
        <h1 class="text-[34px] font-light leading-tight text-[#4A503C] mb-2">
            הקיסרות <span class="font-bold">משתדרגת.</span>
        </h1>
        
        <div class="divider"></div>
        
        <p class="text-[17px] font-medium opacity-60 leading-relaxed max-w-[300px] mx-auto">
            אנחנו מבצעים התאמות במערכת כדי להעניק לך חוויה מדויקת, חכמה ויוקרתית יותר. 
            <br>
            נחזור ממש בקרוב.
        </p>

        <div class="mt-20 text-[9px] font-black uppercase tracking-[0.5em] opacity-20">
            Maya Ben Efraim • 2026
        </div>
    </div>

</body>
</html>
