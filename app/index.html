<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Balance | THE SYSTEM</title>
    
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --rose-pink: #EC6CA1;
            --dark-olive: #4A503C;
            --white: #FFFFFF;
            --rose-light: rgba(236, 108, 161, 0.10);
            --olive-10: rgba(74, 80, 60, 0.10);
            --sage-light: rgba(136, 150, 113, 0.12);
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--white); 
            color: var(--dark-olive); 
            margin: 0; padding: 0;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        /* Brand DNA Rules: No Hebrew Italics */
        h1, h2, h3, h4, span, p, button { 
            font-style: normal !important; 
            letter-spacing: -0.01em;
        }
        
        .luxury-card { 
            background: var(--white); 
            border: 1px solid var(--olive-10); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(74, 80, 60, 0.05); 
        }

        .cta-button {
            background-color: var(--rose-pink);
            color: var(--white);
            border-radius: 20px;
            font-weight: 700;
            height: 56px;
            display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px var(--rose-light);
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .ritual-card {
            background-color: var(--dark-olive);
            border-right: 6px solid var(--rose-pink);
            color: var(--white);
            border-radius: 24px;
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(74, 80, 60, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Men Mode Theme Overlay */
        .theme-men { --rose-pink: #4A503C; --rose-light: rgba(74, 80, 60, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Custom Icons Set
        const Icons = {
            Home: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            Chat: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Library: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>,
            User: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Play: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Music: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        };

        const App = () => {
            const [gender, setGender] = useState('female');
            const [activeTab, setActiveTab] = useState('home');
            const [feeling, setFeeling] = useState(null);

            return (
                <div className={`min-h-screen bg-white pb-32 animate-in ${gender === 'male' ? 'theme-men' : ''}`}>
                    
                    {/* Header Nav */}
                    <nav className="sticky top-0 z-50 bg-white/95 backdrop-blur-md px-6 py-6 border-b border-olive-10 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <span className="text-[10px] font-black uppercase tracking-[0.2em] opacity-40">The Empire OS</span>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={() => setGender(gender === 'female' ? 'male' : 'female')}
                                className="text-[9px] font-black uppercase tracking-widest border border-olive-10 px-3 py-1.5 rounded-full"
                            >
                                {gender === 'female' ? 'Men mode' : 'Women mode'}
                            </button>
                            <div className="w-10 h-10 rounded-full border-2 border-rose-pink p-0.5 shadow-sm" style={{borderColor: 'var(--rose-pink)'}}>
                                <div className="w-full h-full bg-slate-100 rounded-full flex items-center justify-center font-bold text-[10px] text-dark-olive uppercase">MB</div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto px-6 pt-10 space-y-12">
                        
                        {/* Greeting & Check-in */}
                        <header className="text-right space-y-8">
                            <div className="space-y-1">
                                <h1 className="text-4xl font-extrabold text-dark-olive leading-tight tracking-tighter uppercase italic">היי מיה,</h1>
                                <h2 className="text-4xl font-extrabold text-rose-pink opacity-80 leading-none tracking-tighter uppercase italic" style={{color: 'var(--rose-pink)'}}>הגוף שלך מסונכרן.</h2>
                            </div>
                            
                            <div className="space-y-4">
                                <div className="text-[10px] font-bold text-slate-300 uppercase tracking-widest font-bold">עוגן התחושה: איך הגוף שלך מרגיש עכשיו?</div>
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                    {['מאוזנת', 'מותשת', 'מפוקסת', 'עמוסה', 'נפוחה'].map(f => (
                                        <button 
                                            key={f} 
                                            onClick={() => setFeeling(f)}
                                            className={`min-w-[95px] py-4 rounded-2xl luxury-card text-[10px] font-extrabold uppercase transition-all ${feeling === f ? 'border-rose-pink text-rose-pink shadow-md scale-105' : 'opacity-60'}`}
                                            style={feeling === f ? {borderColor: 'var(--rose-pink)', color: 'var(--rose-pink)'} : {}}
                                        >
                                            {f}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </header>

                        {/* Daily Ritual Block */}
                        <section className="ritual-card group shadow-2xl">
                            <div className="relative z-10 space-y-8">
                                <div>
                                    <div className="text-[10px] font-black tracking-[0.5em] mb-2 uppercase" style={{color: 'var(--rose-pink)'}}>Active Protocol</div>
                                    <h2 className="text-4xl font-black uppercase leading-none tracking-tight italic">הריטואל היומי</h2>
                                    <p className="text-xs text-slate-300 mt-3 font-medium opacity-80">שיעור היום • שיר השראה • עוגנים</p>
                                </div>
                                
                                <div className="space-y-5 border-t border-white/5 pt-6">
                                    <div className="flex items-center gap-4 group cursor-pointer hover:translate-x-[-4px] transition-all">
                                        <div className="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-rose-pink border border-white/5" style={{color: 'var(--rose-pink)'}}>
                                            <Icons.Music />
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[8px] font-bold text-white/30 uppercase tracking-widest font-bold">Song of the day</div>
                                            <div className="text-sm font-bold italic">Morning Clarity - #42</div>
                                        </div>
                                    </div>
                                </div>

                                <button className="cta-button uppercase tracking-[0.2em] text-[11px] gap-3" style={{backgroundColor: 'var(--rose-pink)'}}>
                                    <Icons.Play /> כניסה לטקס היומי
                                </button>
                            </div>
                        </section>

                        {/* Quick Actions Grid */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="luxury-card p-8 aspect-square flex flex-col justify-between hover:bg-rose-light transition-all cursor-pointer group">
                                <span className="text-[10px] font-black opacity-30 uppercase tracking-widest italic font-bold">Fuel Library</span>
                                <h3 className="text-xl font-extrabold italic uppercase leading-none underline decoration-rose-pink decoration-2 underline-offset-8" style={{textDecorationColor: 'var(--rose-pink)'}}>תכנון<br/>ותפריט</h3>
                            </div>
                            <div className="luxury-card p-8 aspect-square flex flex-col justify-between hover:bg-rose-light transition-all cursor-pointer">
                                <span className="text-[10px] font-black opacity-30 uppercase tracking-widest italic font-bold">Bio Data</span>
                                <h3 className="text-xl font-extrabold italic uppercase leading-none">המשך<br/>השבוע</h3>
                            </div>
                        </div>

                        <footer className="text-center py-10 opacity-20">
                            <p className="text-[10px] font-black uppercase tracking-[0.5em]">My Balance Empire © 2026</p>
                        </footer>
                    </main>

                    {/* Bottom Nav Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-olive-10 px-4 py-4 pb-10 flex justify-around items-center z-50">
                        {[
                            { id: 'home', label: 'Today', icon: <Icons.Home /> },
                            { id: 'chat', label: 'Ask Maya', icon: <Icons.Chat /> },
                            { id: 'library', label: 'Library', icon: <Icons.Library /> },
                            { id: 'me', label: 'Me', icon: <Icons.User /> }
                        ].map(tab => (
                            <button 
                                key={tab.id} 
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === tab.id ? 'scale-110 font-bold' : 'opacity-30'}`}
                                style={activeTab === tab.id ? {color: 'var(--rose-pink)'} : {}}
                            >
                                <div className={`p-2.5 rounded-2xl ${activeTab === tab.id ? 'bg-rose-light shadow-sm' : ''}`}>
                                    {tab.icon}
                                </div>
                                <span className="text-[10px] font-bold uppercase tracking-widest">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
