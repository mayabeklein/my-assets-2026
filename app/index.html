<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Balance | Empire OS</title>
    
    <!-- Load Tailwind and Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Load React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --rose: #EC6CA1; --olive: #4A503C; --white: #FFFFFF; --bg: #FDFCFB; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--olive); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        * { font-style: normal !important; outline: none; }
        .luxury-card { background: var(--white); border-radius: 24px; border: 1px solid rgba(74, 80, 60, 0.05); box-shadow: 0 10px 40px rgba(74, 80, 60, 0.02); }
        .nav-blur { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .ritual-box { background: var(--olive); border-radius: 32px; overflow: hidden; }
        .input-fine { width: 100%; padding: 1.1rem; border-radius: 16px; border: 1.5px solid rgba(74, 80, 60, 0.1); background: #F9F9F7; text-align: right; font-weight: 700; }
        .btn-solid { width: 100%; padding: 1.1rem; border-radius: 16px; font-weight: 800; transition: all 0.2s ease; text-align: center; border: none; cursor: pointer; }
        .btn-active { background: var(--olive); color: white; }
        .btn-inactive { background: white; border: 2.5px solid rgba(74, 80, 60, 0.1); color: var(--olive); }
        .animate-up { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .recipe-detail { animation: slideIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <!-- מנגנון הגנה: אם ה-JS נכשל, ההודעה הזו תישאר -->
    <div id="no-js" style="padding: 50px; text-align: center; font-family: sans-serif;">
        <h2 style="color: #4A503C;">טוען את המערכת המטבולית...</h2>
        <p style="color: #EC6CA1;">אם המסך נשאר ריק ליותר מ-5 שניות, וודאי שחיבור האינטרנט תקין.</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyByO-6lO1Wn0S3Idwhv3eAohPNAOmMJ_WQ",
            authDomain: "my-balance-empire.firebaseapp.com",
            projectId: "my-balance-empire",
            appId: "1:469352045239:web:95c953de45063a6bc0cb32"
        };

        // Initialize Firebase safely
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            document.getElementById('no-js').style.display = 'none';
        } catch (e) {
            console.error("Firebase Init Error", e);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // Icon Library
        const Icons = {
            Google: () => <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>,
            Home: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            ChevronRight: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"/></svg>
        };

        const RECIPES = [
            { id: 1, title: 'לביבות עדשים כתומות ובטטה', category: 'צהריים', ingredients: ['עדשים', 'בטטה', 'בצל ירוק'], instructions: ['מערבבים', 'אופים'] },
            { id: 2, title: 'שייק ירוק מנקה', category: 'בוקר', ingredients: ['חסה', 'אפרסק', 'צ'יה'], instructions: ['טוחנים הכל'] },
            { id: 3, title: 'סלמון בציפוי אגוזים', category: 'ערב', ingredients: ['סלמון', 'אגוזים', 'שמן זית'], instructions: ['צולים בתנור'] }
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading'); 
            const [step, setStep] = useState(1);
            const [selectedRecipe, setSelectedRecipe] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        setView('home'); // כאן אפשר להוסיף לוגיקה שבודקת אם עשתה שאלון
                    } else {
                        setView('login');
                    }
                });
                return () => unsub();
            }, []);

            // Views
            const LoginView = () => (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-white animate-up text-center">
                    <div className="w-16 h-16 border-2 border-[#4A503C] rounded-2xl flex items-center justify-center font-black text-xl mb-10">MB</div>
                    <h1 className="text-3xl font-black text-[#4A503C] mb-2 uppercase tracking-tighter">My Balance.</h1>
                    <p className="text-xs font-bold opacity-30 mb-12 tracking-widest uppercase">The Infrastructure OS</p>
                    
                    <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full max-w-sm flex items-center justify-center gap-4 py-5 border-2 border-slate-100 rounded-2xl font-black text-sm bg-white hover:bg-slate-50 active:scale-95 transition-all uppercase">
                        <Icons.Google /> כניסה עם Google
                    </button>
                    <button onClick={() => auth.signInAnonymously()} className="mt-8 text-[10px] font-black opacity-20 uppercase tracking-widest">כניסה מהירה</button>
                </div>
            );

            const HomeView = () => (
                <div className="animate-up p-6 pb-32 space-y-10 max-w-md mx-auto">
                    <header className="flex justify-between items-center pt-6">
                        <div className="text-right">
                            <span className="text-[10px] font-black tracking-widest text-[#EC6CA1] uppercase block mb-1">Morning Ritual</span>
                            <h1 className="text-4xl font-black text-[#4A503C] leading-none">היי {user?.displayName?.split(' ')[0] || 'מיה'}, <br/><span className="opacity-20 uppercase">Balance.</span></h1>
                        </div>
                        <div onClick={()=>auth.signOut()} className="w-14 h-14 rounded-2xl overflow-hidden border-2 border-white shadow-lg bg-slate-100 flex items-center justify-center font-bold cursor-pointer">MB</div>
                    </header>

                    <div className="ritual-box p-12 text-white shadow-2xl relative">
                        <div className="relative z-10 flex flex-col justify-between h-48">
                            <div>
                                <h2 className="text-5xl font-black leading-none mb-4 uppercase">הריטואל<br/>היומי</h2>
                                <div className="text-[11px] font-bold tracking-[0.2em] uppercase opacity-40 italic">Active Now</div>
                            </div>
                            <button className="w-16 h-16 bg-[#EC6CA1] rounded-full flex items-center justify-center shadow-2xl"><Icons.Play/></button>
                        </div>
                    </div>

                    <div className="grid gap-4">
                        <div onClick={()=>setView('library')} className="luxury-card p-8 flex items-center justify-between border-r-[8px] border-[#EC6CA1] cursor-pointer active:scale-95 transition-all">
                            <div><span className="text-[10px] font-black opacity-30 uppercase block mb-1">Fuel Library</span><h3 className="text-2xl font-black text-[#4A503C] tracking-tighter">ספריית המתכונים</h3></div>
                            <div className="opacity-20"><Icons.ChevronRight/></div>
                        </div>
                        <div className="luxury-card p-8 flex items-center justify-between border-r-[8px] border-[#889671]">
                            <div><span className="text-[10px] font-black opacity-30 uppercase block mb-1">Daily Anchor</span><h3 className="text-xl font-bold text-[#4A503C]">העוגן המטבולי שלי</h3></div>
                        </div>
                    </div>
                </div>
            );

            const LibraryView = () => (
                <div className="animate-up p-6 pb-32 space-y-10 max-w-md mx-auto relative min-h-screen">
                    <header className="flex justify-between items-end pt-6">
                        <button onClick={()=>setView('home')} className="text-[10px] font-black opacity-30 uppercase mb-2">← חזרה</button>
                        <h2 className="text-4xl font-black text-[#4A503C] uppercase leading-none">The Fuel.</h2>
                    </header>
                    <div className="grid gap-4">
                        {RECIPES.map(recipe => (
                            <div key={recipe.id} onClick={()=>setSelectedRecipe(recipe)} className="luxury-card p-6 flex justify-between items-center cursor-pointer hover:border-rose-100 transition-all">
                                <div className="text-right">
                                    <span className="text-[8px] font-black text-slate-300 uppercase tracking-widest mb-1 block">{recipe.category}</span>
                                    <h4 className="text-lg font-black text-[#4A503C] tracking-tight">{recipe.title}</h4>
                                </div>
                                <div className="text-[10px] font-bold text-slate-400">→</div>
                            </div>
                        ))}
                    </div>

                    {selectedRecipe && (
                        <div className="fixed inset-0 bg-white z-[100] p-8 overflow-y-auto no-scrollbar recipe-detail">
                            <header className="flex justify-between items-center mb-12">
                                <button onClick={()=>setSelectedRecipe(null)} className="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center font-bold">✕</button>
                                <span className="text-[10px] font-black uppercase tracking-widest opacity-30 tracking-[0.4em]">Recipe Protocol</span>
                            </header>
                            <div className="space-y-10 text-right">
                                <h2 className="text-5xl font-black text-[#4A503C] leading-none tracking-tighter uppercase">{selectedRecipe.title}</h2>
                                <div className="p-8 luxury-card bg-slate-50 border-none">
                                    <h4 className="font-black uppercase text-xs tracking-widest opacity-40 mb-4 tracking-[0.2em]">מצרכים:</h4>
                                    <ul className="space-y-3">
                                        {selectedRecipe.ingredients.map((ing, i) => (
                                            <li key={i} className="font-bold flex items-center gap-3">
                                                <div className="w-1.5 h-1.5 rounded-full bg-rose-500"></div> {ing}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'loading') return <div className="min-h-screen flex flex-col items-center justify-center bg-white"><div className="w-10 h-10 border-4 border-slate-100 border-t-[#EC6CA1] rounded-full animate-spin"></div><p className="mt-4 text-[10px] font-black uppercase tracking-[0.4em] opacity-40">Syncing Empire OS</p></div>;

            return (
                <div className="min-h-screen bg-white">
                    {view === 'login' && <LoginView />}
                    {view === 'home' && <HomeView />}
                    {view === 'library' && <LibraryView />}
                    
                    {view !== 'login' && (
                        <nav className="fixed bottom-0 left-0 right-0 nav-blur px-10 py-6 pb-12 flex justify-around items-center z-50 max-w-md mx-auto rounded-t-[40px] shadow-2xl">
                            <button onClick={()=>setView('home')} className={view==='home'?'text-[#EC6CA1]':'opacity-20'}><Icons.Home/></button>
                            <button onClick={()=>setView('library')} className={view==='library'?'text-[#EC6CA1]':'opacity-20'}><Icons.Book/></button>
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
