<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Balance | משדרגים עבורך</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #EC6CA1;
            --olive: #4A503C;
            --white: #FFFFFF;
        }
        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--white); 
            color: var(--olive);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .luxury-card {
            background: white;
            padding: 3rem;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(74, 80, 60, 0.05);
            box-shadow: 0 20px 50px rgba(74, 80, 60, 0.05);
        }
        .pulse-pink {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="luxury-card">
        <div class="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-8 pulse-pink">
            <span style="color: var(--rose); font-size: 2rem;">✨</span>
        </div>
        <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-4 leading-tight">
            הקיסרות <br/><span style="color: var(--rose)">משתדרגת.</span>
        </h1>
        <div class="w-12 h-1 bg-slate-100 mx-auto mb-8 rounded-full"></div>
        <p class="text-lg font-medium opacity-60 leading-relaxed mb-10 italic">
            אנחנו מבצעים שיפוצים קלים במערכת כדי להעניק לך חוויה מדויקת ויוקרתית יותר. 
            <br/><br/>
            אנחנו נחזור ממש בקרוב.
        </p>
        <div class="text-[10px] font-black uppercase tracking-[0.4em] opacity-30">
            My Balance 2026 • Under Construction
        </div>
    </div>
</body>
</html>
