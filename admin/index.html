<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire OS | Control Tower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --rose: #EC6CA1; --olive: #4A503C; --white: #FFFFFF; --rose-light: rgba(236, 108, 161, 0.1); }
        body { font-family: 'Assistant', sans-serif; background-color: #FDFCFB; color: var(--olive); margin: 0; }
        .luxury-card { background: var(--white); border: 1px solid rgba(74, 80, 60, 0.1); border-radius: 24px; box-shadow: 0 10px 40px rgba(74, 80, 60, 0.05); }
        .sidebar-active { background: var(--rose-light); color: var(--rose); border-right: 4px solid var(--rose); font-weight: 800; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [tab, setTab] = useState('crm');
            
            // דוגמה לדאטה של לקוחות - בהמשך יגיע מה-GCP
            const [customers, setCustomers] = useState([
                { id: 1, name: "דנה לוי", phone: "972501234567", status: "Active", program: "ReBalance", lastCheckin: "הבוקר", mood: "מאוזנת" },
                { id: 2, name: "מיכל כהן", phone: "972529876543", status: "Active", program: "14 Days", lastCheckin: "אתמול", mood: "נפוחה" }
            ]);

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-72 bg-white border-l border-black/5 flex flex-col p-8 space-y-8 sticky top-0 h-screen">
                        <div className="text-center mb-10">
                            <span className="text-2xl font-black italic tracking-tighter">EMPIRE OS</span>
                            <div className="text-[10px] font-black uppercase opacity-30 tracking-[0.3em] mt-1">Management Suite</div>
                        </div>
                        <nav className="flex-1 space-y-2 text-right">
                            <button onClick={()=>setTab('crm')} className={`w-full text-right p-4 rounded-2xl flex items-center gap-4 transition-all ${tab==='crm'?'sidebar-active':'opacity-40 hover:opacity-100'}`}>
                                <span className="text-xl">👥</span> CRM לקוחות
                            </button>
                            <button onClick={()=>setTab('kb')} className={`w-full text-right p-4 rounded-2xl flex items-center gap-4 transition-all ${tab==='kb'?'sidebar-active':'opacity-40 hover:opacity-100'}`}>
                                <span className="text-xl">🧠</span> סנכרון מוח (AI)
                            </button>
                            <button onClick={()=>setTab('content')} className={`w-full text-right p-4 rounded-2xl flex items-center gap-4 transition-all ${tab==='content'?'sidebar-active':'opacity-40 hover:opacity-100'}`}>
                                <span className="text-xl">📱</span> ניהול תוכן
                            </button>
                        </nav>
                        <div className="pt-6 border-t border-black/5">
                            <a href="../" className="block w-full text-center py-4 rounded-2xl bg-slate-50 text-[11px] font-black uppercase tracking-widest hover:bg-slate-100 transition-colors">חזרה למרכזייה</a>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-16 text-right overflow-y-auto">
                        {tab === 'crm' ? (
                            <div className="space-y-10 animate-in">
                                <header className="flex justify-between items-end">
                                    <div className="space-y-1">
                                        <h1 className="text-4xl font-black italic uppercase">CRM מטבולי</h1>
                                        <p className="opacity-40 font-bold">מעקב לקוחות וחיבור ישיר ל-WhatsApp</p>
                                    </div>
                                    <button className="bg-dark-olive text-white px-8 py-3 rounded-full font-bold text-sm shadow-lg" style={{backgroundColor:'#4A503C'}}>ייצוא דוח יומי</button>
                                </header>

                                <div className="luxury-card overflow-hidden">
                                    <table className="w-full text-right border-collapse">
                                        <thead className="bg-slate-50 border-b border-black/5">
                                            <tr>
                                                <th className="p-6 text-[10px] font-black uppercase opacity-40">לקוחה</th>
                                                <th className="p-6 text-[10px] font-black uppercase opacity-40">תוכנית</th>
                                                <th className="p-6 text-[10px] font-black uppercase opacity-40">סטטוס גוף</th>
                                                <th className="p-6 text-[10px] font-black uppercase opacity-40">פעולות</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {customers.map(c => (
                                                <tr key={c.id} className="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                                                    <td className="p-6">
                                                        <div className="font-extrabold text-lg">{c.name}</div>
                                                        <div className="text-xs opacity-40 font-bold tracking-wide">{c.phone}</div>
                                                    </td>
                                                    <td className="p-6">
                                                        <span className="bg-rose-50 text-rose-pink px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest" style={{color:'#EC6CA1', backgroundColor:'rgba(236,108,161,0.05)'}}>{c.program}</span>
                                                    </td>
                                                    <td className="p-6 font-bold italic text-rose-pink" style={{color:'#EC6CA1'}}>{c.mood}</td>
                                                    <td className="p-6">
                                                        <div className="flex gap-3">
                                                            <a href={`https://wa.me/${c.phone}`} target="_blank" className="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-sm">
                                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                                            </a>
                                                            <button className="w-10 h-10 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center hover:bg-slate-100 transition-all">📋</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10 animate-in">
                                <h1 className="text-4xl font-black italic uppercase">סנכרון מוח (Knowledge Base)</h1>
                                <div className="luxury-card p-12 space-y-8">
                                    <div className="space-y-2">
                                        <h3 className="font-bold text-lg">הדביקי כאן ידע מקצועי חדש</h3>
                                        <p className="text-sm opacity-40">ה-AI ילמד את הטקסט הזה ויוכל לענות ללקוחות בשמך באפליקציה.</p>
                                    </div>
                                    <textarea className="w-full h-80 bg-slate-50 border-none rounded-3xl p-8 text-lg outline-none focus:ring-2 focus:ring-rose-pink transition-all" placeholder="למשל: הנחיות חדשות לתחליפי סוכר, פרוטוקול שינה מעודכן..." />
                                    <button className="w-full py-5 rounded-3xl text-white font-black uppercase tracking-[0.2em] shadow-2xl transition-transform active:scale-95" style={{backgroundColor:'#EC6CA1'}}>עדכון סוכנת Maya AI</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
