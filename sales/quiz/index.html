<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metabolic Quiz | My Balance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --rose: #EC6CA1; --olive: #4A503C; --white: #FFFFFF; --rose-light: rgba(236, 108, 161, 0.1); }
        body { font-family: 'Assistant', sans-serif; background-color: #FDFCFB; color: var(--olive); margin: 0; }
        .quiz-card { background: var(--white); border-radius: 30px; box-shadow: 0 20px 50px rgba(74, 80, 60, 0.05); }
        .option-btn { border: 1px solid rgba(74, 80, 60, 0.1); border-radius: 20px; padding: 20px; transition: all 0.2s ease; text-align: right; font-weight: 700; }
        .option-btn:hover { border-color: var(--rose); background: var(--rose-light); }
        .option-btn.active { border-color: var(--rose); background: var(--rose); color: white; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [step, setStep] = useState(0);
            const [answers, setAnswers] = useState({});

            const questions = [
                { id: 'goal', q: "מה המטרה המרכזית שלך כרגע?", options: ["איזון רמות הסטרס", "ירידה במשקל ונפיחות", "שיפור רמות האנרגיה", "סינכרון הורמונלי מלא"] },
                { id: 'status', q: "האם את נמצאת באחד מהמצבים הבאים?", options: ["הריון / הנקה", "גיל המעבר", "ADHD / קשיי ריכוז", "אחר / בריאה בדרך כלל"] },
                { id: 'digestion', q: "איך היית מגדירה את העיכול שלך?", options: ["נפיחות יומיומית", "איטי ותקוע", "רגישות למזונות מסוימים", "תקין ומאוזן"] }
            ];

            const handleSelect = (option) => {
                setAnswers({...answers, [questions[step].id]: option});
                if (step < questions.length - 1) setStep(step + 1);
                else setStep('done');
            };

            if (step === 'done') return (
                <div className="min-h-screen flex items-center justify-center p-6 text-center">
                    <div className="max-w-md space-y-8 animate-in">
                        <div className="text-6xl">✨</div>
                        <h1 className="text-4xl font-black italic uppercase">האבחון הושלם.</h1>
                        <p className="text-lg opacity-60 font-bold leading-relaxed">הנתונים שלך נשלחו למערכת. הסוכנת Maya כבר מעבדת את הפרוטוקול המדויק עבורך.</p>
                        <a href="../../app/" className="block w-full py-5 bg-dark-olive text-white rounded-2xl font-black uppercase tracking-widest shadow-xl" style={{backgroundColor:'#4A503C'}}>כניסה לאפליקציה</a>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-6 md:p-12 flex flex-col items-center">
                    <header className="w-full max-w-2xl flex justify-between items-center mb-20">
                        <span className="text-[10px] font-black uppercase tracking-widest opacity-30">Onboarding Protocol</span>
                        <div className="flex gap-1">
                            {questions.map((_, i) => <div key={i} className={`h-1 w-8 rounded-full ${i <= step ? 'bg-rose-pink' : 'bg-slate-200'}`} style={i <= step ? {backgroundColor:'#EC6CA1'} : {}}></div>)}
                        </div>
                    </header>
                    <main className="w-full max-w-xl space-y-10 text-right">
                        <h2 className="text-3xl md:text-5xl font-extrabold leading-tight tracking-tight italic uppercase">{questions[step].q}</h2>
                        <div className="grid gap-4">
                            {questions[step].options.map(opt => (
                                <button key={opt} onClick={() => handleSelect(opt)} className="option-btn">{opt}</button>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
